#      - WATCHPACK_POLLING=true

  template-ui:
    build: ./template-ui/client
    restart: always
    hostname: template-ui
    container_name: template-ui
    ports:
      - 3000:3000
    volumes:
      - /opt/beacon/beacon2-pi-api-isciii/template-ui/client/src/config/config.json:/client/src/config/config.json:ro,Z
    networks:
      - pub
 
  apache-beacon:
    image: registry.access.redhat.com/ubi9/httpd-24
    container_name: apache-beacon
    restart: unless-stopped
    depends_on:
      - beaconprod
      - template-ui
    ports:
      - "8443:8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo:/usr/share/zoneinfo
      - /opt/beacon/beacon2-pi-api-isciii/conf/beacon_apache_reverse_proxy.conf:/etc/httpd/conf.d/beacon.conf:ro,Z
      - /var/log/local/apps/beacon/apache:/var/log/httpd:Z
    networks:
      - pub
